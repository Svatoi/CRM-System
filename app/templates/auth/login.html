<div class="card login-card p-4">
    <div class="text-center mb-4">
        <i class="bi bi-box-seam text-primary" style="font-size: 3rem;"></i>
        <h2 class="mt-2 fw-bold">Login to CRM</h2>
        <p class="text-muted text-sm">Manage your warehouse efficiently</p>
    </div>

    <!-- Displaying validation errors -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-danger p-2" style="font-size: 0.9rem;" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                <input type="text" class="form-control" id="username" name="username" placeholder="admin" required>
            </div>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-full w-100 py-2 fw-semibold">Log in</button>
    </form>
</div>
