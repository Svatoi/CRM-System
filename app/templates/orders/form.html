{% extends 'base.html' %}

{% block title %}{{ action }} Order | CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2 fw-bold">{{ action }} Order</h1>
    <a href="{{ url_for('orders.list_orders') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back to list
    </a>
</div>

<div class="row">
    <div class="col-12 col-lg-8">
        <div class="card card-custom p-4 bg-white shadow-sm border-0">
            <form method="POST">
                <div class="mb-3">
                    <label for="client_name" class="form-label fw-semibold">Client Name</label>
                    <input type="text" class="form-control" id="client_name" name="client_name" placeholder="John Doe" value="{{ order.client_name if order else '' }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="product" class="form-label fw-semibold">Product / Service</label>
                    <input type="text" class="form-control" id="product" name="product" placeholder="Cardboard packaging box" value="{{ order.product if order else '' }}" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-12 col-md-6">
                        <label for="quantity" class="form-label fw-semibold">Quantity</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1" placeholder="1" value="{{ order.quantity if order else 1 }}" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="price" class="form-label fw-semibold">Price per unit (₽)</label>
                        <input type="number" step="0.01" class="form-control" id="price" name="price" placeholder="150.00" value="{{ order.price if order else '' }}" required>
                    </div>
                </div>

                {% if order %}
                    <div class="mb-4">
                        <label for="status" class="form-label fw-semibold">Order Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="New" {% if order.status == 'New' %}selected{% endif %}>New</option>
                            <option value="In progress" {% if order.status == 'In progress' %}selected{% endif %}>In progress</option>
                            <option value="Completed" {% if order.status == 'Completed' %}selected{% endif %}>Completed</option>
                        </select>
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">
                    <i class="bi bi-save me-2"></i>Save Order
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
